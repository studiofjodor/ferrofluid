<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>WebGL Sonic Ferrofluid</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(10, 10, 15, 0.75);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #333;
            backdrop-filter: blur(12px);
            max-width: 320px;
        }
        h2 { margin: 0 0 10px 0; font-size: 1.3rem; font-weight: 300; letter-spacing: 2px; text-transform: uppercase;}
        p { font-size: 0.85rem; color: #aaa; margin-bottom: 20px; line-height: 1.4; }
        input[type="file"] { width: 100%; margin-bottom: 15px; }
        audio { width: 100%; outline: none; border-radius: 4px; }
        canvas { display: block; width: 100%; height: 100%; outline: none; }
        
        /* Loading Overlay */
        #start-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 20; display: flex; align-items: center; justify-content: center;
            transition: opacity 1s; pointer-events: none;
        }
    </style>
    
    <!-- Import Map für modernes Three.js via ES Modules -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

<div id="start-overlay">Initialisiere WebGL...</div>

<div id="ui">
    <h2>Sonisches Ferrofluid</h2>
    <p>Lade einen Track hoch. Nutze die <b>Maus</b> (Klicken & Ziehen), um das Klangobjekt im 3D-Raum zu drehen und hineinzuzoomen.</p>
    <input type="file" id="audioUpload" accept="audio/*">
    <audio id="audioElement" controls></audio>
</div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    document.getElementById('start-overlay').style.opacity = '0';

    let audioCtx, analyser, dataArray;
    let isInitialized = false;

    // Smoothed Audio Values (um Flackern zu vermeiden)
    let sBass = 0, sMid = 0, sHigh = 0;

    const audioEl = document.getElementById('audioElement');
    const uploadEl = document.getElementById('audioUpload');

    uploadEl.addEventListener('change', function() {
        if (this.files[0]) {
            audioEl.src = URL.createObjectURL(this.files[0]);
            audioEl.play();
        }
    });

    audioEl.addEventListener('play', () => {
        if (!isInitialized) {
            initAudio();
            isInitialized = true;
        }
    });

    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaElementSource(audioEl);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 1024;
        source.connect(analyser);
        analyser.connect(audioCtx.destination);
        dataArray = new Uint8Array(analyser.frequencyBinCount);
    }

    // --- THREE.JS SETUP ---
    const scene = new THREE.Scene();
    // Tiefschwarzer Hintergrund für maximalen Kontrast
    scene.background = new THREE.Color(0x020205); 
    // Nebel, damit die Form in der Tiefe sanft ausblendet
    scene.fog = new THREE.FogExp2(0x020205, 0.015);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 25;

    const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    // --- POST-PROCESSING (Cinematic Bloom) ---
    const renderScene = new RenderPass(scene, camera);
    // Parameter: Resolution, Strength, Radius, Threshold
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.5, 0.5, 0.1);
    
    const composer = new EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);

    // --- SHADER MATERIAL (Die Magie auf der Grafikkarte) ---
    // Ein Icosaeder mit hohem Detailgrad generiert uns zehntausende gleichmäßig verteilte Punkte (Partikel)
    const geometry = new THREE.IcosahedronGeometry(8, 128); 

    const material = new THREE.ShaderMaterial({
        uniforms: {
            uTime: { value: 0 },
            uBass: { value: 0 },
            uMid: { value: 0 },
            uHigh: { value: 0 }
        },
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending, // Farben summieren sich auf (Glühen)
        
        // VERTEX SHADER: Verformt die Geometrie basierend auf Audio
        vertexShader: `
            uniform float uTime;
            uniform float uBass;
            uniform float uMid;
            uniform float uHigh;

            varying float vDisplacement;

            // Simplex 3D Noise Funktion (kompakte Version)
            vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
            vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
            float snoise(vec3 v) {
                const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
                const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);
                vec3 i  = floor(v + dot(v, C.yyy) );
                vec3 x0 = v - i + dot(i, C.xxx) ;
                vec3 g = step(x0.yzx, x0.xyz);
                vec3 l = 1.0 - g;
                vec3 i1 = min( g.xyz, l.zxy );
                vec3 i2 = max( g.xyz, l.zxy );
                vec3 x1 = x0 - i1 + C.xxx;
                vec3 x2 = x0 - i2 + C.yyy;
                vec3 x3 = x0 - D.yyy;
                i = mod289(i);
                vec4 p = permute( permute( permute(
                            i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                          + i.y + vec4(0.0, i1.y, i2.y, 1.0 ))
                          + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
                float n_ = 0.142857142857;
                vec3  ns = n_ * D.wyz - D.xzx;
                vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
                vec4 x_ = floor(j * ns.z);
                vec4 y_ = floor(j - 7.0 * x_ );
                vec4 x = x_ *ns.x + ns.yyyy;
                vec4 y = y_ *ns.x + ns.yyyy;
                vec4 h = 1.0 - abs(x) - abs(y);
                vec4 b0 = vec4( x.xy, y.xy );
                vec4 b1 = vec4( x.zw, y.zw );
                vec4 s0 = floor(b0)*2.0 + 1.0;
                vec4 s1 = floor(b1)*2.0 + 1.0;
                vec4 sh = -step(h, vec4(0.0));
                vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
                vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
                vec3 p0 = vec3(a0.xy,h.x);
                vec3 p1 = vec3(a0.zw,h.y);
                vec3 p2 = vec3(a1.xy,h.z);
                vec3 p3 = vec3(a1.zw,h.w);
                vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
                p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
                vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                m = m * m;
                return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
            }

            void main() {
                vec3 pos = position;
                vec3 norm = normalize(position);
                
                // Mitten steuern die Unruhe (Frequenz) des Rauschens
                float noiseFreq = 0.3 + (uMid * 1.5);
                float noise = snoise(pos * noiseFreq + (uTime * 0.5));
                
                // Displacement (Verschiebung der Partikel nach außen)
                // Bass dehnt die Form aus, Mitten lassen das Noise ausschlagen (Stacheln)
                float displacement = (noise * uMid * 5.0) + (uBass * 4.0);
                pos += norm * displacement;
                
                vDisplacement = displacement;
                
                vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                
                // Höhen lassen die Partikel aufblitzen / größer werden
                gl_PointSize = (1.5 + (uHigh * 8.0)) * (100.0 / -mvPosition.z);
                gl_Position = projectionMatrix * mvPosition;
            }
        `,
        
        // FRAGMENT SHADER: Färbt die Partikel und macht sie rund
        fragmentShader: `
            uniform float uHigh;
            varying float vDisplacement;

            void main() {
                // Aus viereckigen Punkten runde, weiche Punkte machen
                float dist = distance(gl_PointCoord, vec2(0.5));
                if(dist > 0.5) discard;
                
                // Farb-Palette: Tiefsee-Blau zu Magma-Pink/Orange
                vec3 baseColor = vec3(0.05, 0.2, 0.8);
                vec3 peakColor = vec3(1.0, 0.1, 0.5);
                
                // Je weiter ein Partikel nach außen geschoben wurde, desto mehr 'Peak Color' bekommt er
                float mixFactor = smoothstep(-1.0, 4.0, vDisplacement);
                vec3 finalColor = mix(baseColor, peakColor, mixFactor);
                
                // Höhen mischen gleißendes Weiß/Cyan hinzu
                finalColor += vec3(0.5, 1.0, 1.0) * uHigh * (mixFactor + 0.5);
                
                // Weicher Rand für den Punkt
                float alpha = smoothstep(0.5, 0.1, dist);
                
                gl_FragColor = vec4(finalColor, alpha);
            }
        `
    });

    // Anstatt eines soliden Objekts rendern wir tausende Punkte
    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    // Resize-Handler
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    });

    // Hilfsfunktion: Durchschnittswerte
    function getAverage(arr, start, end) {
        let sum = 0;
        for (let i = start; i < end; i++) sum += arr[i];
        return sum / (end - start);
    }

    // Lineare Interpolation (für smoothe Animationen)
    function lerp(start, end, amt) {
        return (1 - amt) * start + amt * end;
    }

    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        
        let bass = 0, mid = 0, high = 0;

        if (isInitialized) {
            analyser.getByteFrequencyData(dataArray);
            
            // Frequenzbereiche auslesen (normalisiert auf 0.0 - 1.0)
            bass = getAverage(dataArray, 0, 10) / 255;
            mid = getAverage(dataArray, 11, 150) / 255;
            high = getAverage(dataArray, 151, 400) / 255;
            
            // Werte glätten, damit es nicht nervös zuckt, sondern atmet
            sBass = lerp(sBass, bass, 0.15);
            sMid = lerp(sMid, mid, 0.15);
            sHigh = lerp(sHigh, high, 0.2);
        }

        const elapsedTime = clock.getElapsedTime();
        
        // Konstante Rotation des Gesamtobjekts
        particles.rotation.y = elapsedTime * 0.1;
        particles.rotation.x = elapsedTime * 0.05;

        // Daten an die Grafikkarte (Shader) senden
        material.uniforms.uTime.value = elapsedTime;
        material.uniforms.uBass.value = sBass;
        material.uniforms.uMid.value = sMid;
        material.uniforms.uHigh.value = sHigh;

        controls.update();
        
        // Post-Processing Composer statt Standard-Renderer nutzen
        composer.render();
    }

    animate();
</script>
</body>
</html>
